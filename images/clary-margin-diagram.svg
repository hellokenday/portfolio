<svg width="760" height="470" viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, Roboto, sans-serif">
  <defs>
    
    <pattern id="pFloor" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#e8b94a"></rect>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b8902f" stroke-width="3"></line>
    </pattern>
    <pattern id="pVar" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#ffb084"></rect>
      <circle cx="5" cy="5" r="2" fill="#e07a45"></circle>
    </pattern>
    <pattern id="pLoss" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <rect width="8" height="8" fill="#ff6b5a"></rect>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#c2412f" stroke-width="3"></line>
    </pattern>
    <clipPath id="barClip">
      <path d="M110,410 L110,168 Q110,158 120,158 L280,158 Q290,158 290,168 L290,410 Z"></path>
    </clipPath>
  </defs>

  
  <rect x="0.75" y="0.75" width="758.5" height="468.5" rx="16" fill="#fffaf0" stroke="#e5e5e5" stroke-width="1.5"></rect>

  
  <text x="48" y="46" font-size="12" font-weight="600" letter-spacing="1.5" fill="#6a6a6a">COST VS PRICE</text>
  <text x="48" y="76" font-size="22" font-weight="500" letter-spacing="-0.5" fill="#0a0a0a">Serving a user cost almost as much as they paid</text>

  
  <g font-size="11" fill="#9a9a9a" text-anchor="end">
    <text x="98" y="162">€7</text>
    <text x="98" y="234">€4.99</text>
    <text x="98" y="342">€2</text>
    <text x="98" y="414">€0</text>
  </g>

  
  <g clip-path="url(#barClip)">
    <rect x="110" y="158" width="180" height="72" fill="url(#pLoss)"></rect>   
    <rect x="110" y="230" width="180" height="108" fill="url(#pVar)"></rect>    
    <rect x="110" y="338" width="180" height="72" fill="url(#pFloor)"></rect>  
  </g>

  
  <line x1="110" y1="230" x2="290" y2="230" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="2 4"></line>

  
  <path d="M110,410 L110,168 Q110,158 120,158 L280,158 Q290,158 290,168 L290,410 Z" fill="none" stroke="#0a0a0a" stroke-width="1.5"></path>

  
  <g>
    <rect x="430" y="172" width="18" height="18" rx="4" fill="url(#pLoss)" stroke="#0a0a0a" stroke-width="1"></rect>
    <text x="458" y="185" font-size="14" font-weight="600" fill="#0a0a0a">Loss zone</text>
    <text x="458" y="202" font-size="13" fill="#6a6a6a">Costs more than €4.99 to serve</text>

    <rect x="430" y="238" width="18" height="18" rx="4" fill="url(#pVar)" stroke="#0a0a0a" stroke-width="1"></rect>
    <text x="458" y="251" font-size="14" font-weight="600" fill="#0a0a0a">€2–7 to serve one user</text>
    <text x="458" y="268" font-size="13" fill="#6a6a6a">Per month, depending on usage</text>

    <rect x="430" y="304" width="18" height="18" rx="4" fill="url(#pFloor)" stroke="#0a0a0a" stroke-width="1"></rect>
    <text x="458" y="317" font-size="14" font-weight="600" fill="#0a0a0a">€2 floor cost</text>
    <text x="458" y="334" font-size="13" fill="#6a6a6a">Even for a perfect-fit user</text>

    <line x1="430" y1="372" x2="448" y2="372" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="2 4"></line>
    <text x="458" y="377" font-size="14" font-weight="600" fill="#0a0a0a">€4.99, what we charge</text>
  </g>

  
  <text x="48" y="446" font-size="13" fill="#6a6a6a" font-style="italic">At the top of the range, a user cost more than they paid.</text>
</svg>